version: 1

filesystem_policy:
  read_only:
    - /usr
    - /lib
    - /etc
  read_write:
    - /sandbox
    - /tmp
    - /dev/null
    - /dev/urandom

landlock:
  compatibility: best_effort

process:
  run_as_user: sandbox
  run_as_group: sandbox

network_policies:
  discord_gateway:
    name: discord-gateway
    endpoints:
      - host: gateway.discord.gg
        port: 443
        protocol: websocket
        enforcement: enforce
        access: full
        websocket_credential_rewrite: true
    binaries:
      - path: /usr/local/bin/node

  discord_api:
    name: discord-api
    endpoints:
      - host: discord.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
      - host: discordapp.com
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/local/bin/node

  discord_cdn:
    name: discord-cdn
    endpoints:
      - host: cdn.discordapp.com
        port: 443
        enforcement: log
        access: full
      - host: media.discordapp.net
        port: 443
        enforcement: log
        access: full
    binaries:
      - path: /usr/local/bin/node

  openrouter:
    name: openrouter
    endpoints:
      - host: openrouter.ai
        port: 443
        protocol: rest
        enforcement: enforce
        access: full
    binaries:
      - path: /usr/local/bin/node

  npm_registry:
    name: npm-registry
    endpoints:
      - host: registry.npmjs.org
        port: 443
        protocol: rest
        enforcement: log
        access: full
    binaries:
      - path: /usr/local/bin/node
