apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-gateway
spec:
  template:
    spec:
      containers:
      - name: hermes
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-dashboard
spec:
  template:
    spec:
      containers:
      - name: dashboard
        resources:
          requests:
            memory: "128Mi"
            cpu: "50m"
          limits:
            memory: "1Gi"
            cpu: "500m"
