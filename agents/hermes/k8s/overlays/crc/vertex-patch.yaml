apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-gateway
spec:
  template:
    spec:
      containers:
      - name: hermes
        env:
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/secrets/vertex/application_default_credentials.json"
        volumeMounts:
        - name: vertex-credentials
          mountPath: /secrets/vertex
          readOnly: true
      volumes:
      - name: vertex-credentials
        secret:
          secretName: vertex-credentials
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-dashboard
spec:
  template:
    spec:
      containers:
      - name: dashboard
        env:
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: "/secrets/vertex/application_default_credentials.json"
        volumeMounts:
        - name: vertex-credentials
          mountPath: /secrets/vertex
          readOnly: true
      volumes:
      - name: vertex-credentials
        secret:
          secretName: vertex-credentials
